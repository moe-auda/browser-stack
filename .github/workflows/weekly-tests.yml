name: Weekly BrowserStack Tests

# Runs across 4 days (4 tests/day) to stay within Speed Lab API quota.
# All results are ready before the Tuesday 11 AM PT weekly meeting.
#
# Fri  10:00 UTC — iPhone 12          (4 Speed Lab tests)
# Sat  10:00 UTC — Samsung Galaxy S10 (4 Speed Lab tests)
# Sun  10:00 UTC — OS X Safari        (4 Speed Lab tests)
# Mon  10:00 UTC — Windows Chrome     (4 Speed Lab tests)
#
# After each run, results are committed and GitHub Pages updates automatically.

on:
  schedule:
    - cron: '0 10 * * 5'   # Friday    10:00 UTC  (3 AM PDT)
    - cron: '0 10 * * 6'   # Saturday  10:00 UTC  (3 AM PDT)
    - cron: '0 10 * * 0'   # Sunday    10:00 UTC  (3 AM PDT)
    - cron: '0 10 * * 1'   # Monday    10:00 UTC  (3 AM PDT)
  workflow_dispatch:
    inputs:
      day:
        description: 'Which profile to run'
        required: true
        default: 'iphone'
        type: choice
        options:
          - iphone
          - galaxy
          - safari
          - chrome
          - all

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests — Friday (iPhone 12)
        if: github.event.schedule == '0 10 * * 5' || (github.event_name == 'workflow_dispatch' && inputs.day == 'iphone')
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: node run-tests.js --iphone

      - name: Run tests — Saturday (Samsung Galaxy S10)
        if: github.event.schedule == '0 10 * * 6' || (github.event_name == 'workflow_dispatch' && inputs.day == 'galaxy')
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: node run-tests.js --galaxy

      - name: Run tests — Sunday (OS X Big Sur Safari)
        if: github.event.schedule == '0 10 * * 0' || (github.event_name == 'workflow_dispatch' && inputs.day == 'safari')
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: node run-tests.js --safari

      - name: Ensure Chrome is installed (for Lighthouse)
        if: github.event.schedule == '0 10 * * 1' || (github.event_name == 'workflow_dispatch' && inputs.day == 'chrome') || (github.event_name == 'workflow_dispatch' && inputs.day == 'all')
        run: google-chrome --version 2>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y google-chrome-stable)

      - name: Run tests — Monday (Windows 11 Chrome)
        if: github.event.schedule == '0 10 * * 1' || (github.event_name == 'workflow_dispatch' && inputs.day == 'chrome')
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: node run-tests.js --chrome

      - name: Run all tests (manual override)
        if: github.event_name == 'workflow_dispatch' && inputs.day == 'all'
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: node run-tests.js

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --staged --quiet || git commit -m "chore: test results $(date +%Y-%m-%d)"
          git push
